<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>챕터 선택</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .wrong-note-chapter { background-color: #fff3cd; border-color: #ffeeba; }
        .wrong-note-chapter .chapter-title { color: #856404; }
    </style>
</head>
<body>
<div class="container">
    <h1>시험 볼 챕터를 선택하세요</h1>

    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

    <form th:action="@{/vocabulary/exam/start-test}" method="post">
        <input type="hidden" name="examType" th:value="${examType}" />

        <div th:if="${#lists.isEmpty(chapters)}" class="alert alert-info">...</div>

        <div th:each="chapter : ${chapters}" class="chapter-item"
             th:classappend="${chapter.id == 0} ? 'wrong-note-chapter' : ''">
            <input type="checkbox" name="selectedChapterIds" th:value="${chapter.id}" th:id="'chapter-' + ${chapter.id}" class="form-check-input">
            <label th:for="'chapter-' + ${chapter.id}" class="form-check-label chapter-title">
                <span th:text="${chapter.title}"></span>
                <span class="chapter-number" th:if="${chapter.id != 0}" th:text="'(챕터 ' + ${chapter.chapterNumber} + ')'"></span>
                <span class="word-count">(<span th:text="${#lists.size(chapter.words)}"></span> 단어)</span>
            </label>
        </div>

        <div class="btn-group-custom">
            <button type="submit" class="btn btn-success btn-lg">시험 시작</button>
            <a href="/vocabulary/exam/start" class="btn btn-secondary btn-lg ml-2">뒤로 가기</a>
        </div>
    </form>
</div>
</body>
</html>
